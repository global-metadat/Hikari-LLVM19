name: Build Hikari-LLVM for Windows (Android Target)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ninja
        run: choco install ninja

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S llvm -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLLVM_ENABLE_PROJECTS="clang;lld" ^
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" ^
            -DLLVM_ENABLE_ASSERTIONS=OFF ^
            -DLLVM_PARALLEL_LINK_JOBS=2 ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl

      - name: Build Clang and LLD
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          ninja -C build clang lld

      - name: Package Artifacts
        shell: cmd
        run: |
          mkdir hikari-toolchain\bin
          copy build\bin\clang.exe hikari-toolchain\bin\
          copy build\bin\clang.exe hikari-toolchain\bin\clang++.exe
          copy build\bin\lld.exe hikari-toolchain\bin\
          copy build\bin\lld.exe hikari-toolchain\bin\ld.lld.exe

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: Hikari-Windows-Toolchain
          path: hikari-toolchain\
